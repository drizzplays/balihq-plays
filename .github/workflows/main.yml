name: BaliHQ Bot Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # Caching dependencies speeds up your workflow and saves credits
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensuring discord.py is installed even if requirements.txt is missing
          pip install discord.py 

      - name: Run Bot
        env:
          # If you use secrets for your bot token or Google JSON keys
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
